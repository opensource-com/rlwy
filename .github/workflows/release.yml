name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: build (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            linker: aarch64-linux-gnu-gcc
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross linker (linux-arm64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/cli -> target

      - name: Set version from tag
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Injecting version ${VERSION} into Cargo.toml"
          sed -i.bak -E "s/^version = \".*\"/version = \"${VERSION}\"/" apps/cli/Cargo.toml
          rm apps/cli/Cargo.toml.bak
          head -5 apps/cli/Cargo.toml

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
        working-directory: apps/cli

      - name: Stage artifact
        shell: bash
        run: |
          mkdir -p artifacts
          VERSION="${GITHUB_REF_NAME#v}"
          if [[ "${{ matrix.target }}" == *windows* ]]; then
            cp "apps/cli/target/${{ matrix.target }}/release/rlwy.exe" \
               "artifacts/rlwy-v${VERSION}-${{ matrix.target }}.exe"
          else
            cp "apps/cli/target/${{ matrix.target }}/release/rlwy" \
               "artifacts/rlwy-v${VERSION}-${{ matrix.target }}"
          fi
          ls -la artifacts

      - uses: actions/upload-artifact@v4
        with:
          name: rlwy-${{ matrix.target }}
          path: artifacts/*
          if-no-files-found: error

  release:
    name: github release + npm publish
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Upload binaries to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          fail_on_unmatched_files: true

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'

      - run: npm install

      - name: Set version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Injecting version ${VERSION} into packages/rlwy/package.json"
          npm pkg set version="${VERSION}" --workspace=packages/rlwy
          cat packages/rlwy/package.json

      - run: npx nx build rlwy

      - name: Publish to npm
        working-directory: packages/rlwy
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public
